
services:
  angular-app:
    image: node:latest
    command:
      - sh
      - -c
      - |
        npm install && npm run start
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ../apps/angular-app_/:/app   
  #   # depends_on:
  #   #   - keycloak
  api-node:
    image: node:latest
    command:
      - sh
      - -c
      - |
        npm install && npm start
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../apps/api-node_/:/app   
    # depends_on:
    #   - keycloak  
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command:
      - start-dev
      - --hostname-strict=false
      - --proxy-headers=xforwarded
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
        - ./themes/custom-theme:/opt/keycloak/themes/custom-theme
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - keycloak

  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    environment:
      LDAP_ORGANISATION: "Training Org"
      LDAP_DOMAIN: "training.local"
      LDAP_ADMIN_PASSWORD: admin
    volumes:
      - ./users:/tmp/users
    ports:
      - "389:389"
    restart: always


  ldap-ui:
    image: osixia/phpldapadmin:0.9.0
    container_name: ldap-ui
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8081:80"
    depends_on:
      - openldap
    restart: always